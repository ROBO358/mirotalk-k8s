apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mirotalk-gateway
spec:
  gatewayClassName: cilium
  infrastructure:
    annotations:
      io.cilium/lb-ipam-ips: 192.168.1.104
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: mirotalk-tls
      allowedRoutes:
        namespaces:
          from: Same
